name: Validate stories.yaml

on:
  push:
    paths:
      - '**stories.yaml'
      - '**stories.json'
      - 'schema/**'
      - 'examples/**'
      - '.github/workflows/validate-schema.yml'
  pull_request:
    paths:
      - '**stories.yaml'
      - '**stories.json'
      - 'schema/**'
      - 'examples/**'
      - '.github/workflows/validate-schema.yml'
  workflow_dispatch:

jobs:
  validate:
    name: Validate against schema
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install -g ajv-cli ajv-formats
          npm install --no-save js-yaml

      - name: Set schema paths
        run: |
          echo "SCHEMA_V10=schema/v1.0/stories.schema.json" >> $GITHUB_ENV
          echo "SCHEMA_V11=schema/v1.1/stories.schema.json" >> $GITHUB_ENV
          echo "SCHEMA_V12=schema/v1.2/stories.schema.json" >> $GITHUB_ENV

      - name: Validate example YAML files
        run: |
          for f in examples/*.yaml; do
            echo "Validating $f..."
            node -e "
              const yaml = require('js-yaml');
              const fs = require('fs');
              const doc = yaml.load(fs.readFileSync('$f', 'utf8'));
              fs.writeFileSync('/tmp/example-converted.json', JSON.stringify(doc, null, 2));
            "
            SCHEMA_VER=$(node -e "const f=require('/tmp/example-converted.json'); console.log(f.schema_version||'1.0');")
            if [[ "$SCHEMA_VER" == 1.0* ]]; then
              SCHEMA_FILE="$SCHEMA_V10"
            elif [[ "$SCHEMA_VER" == 1.2* ]]; then
              SCHEMA_FILE="$SCHEMA_V12"
            else
              SCHEMA_FILE="$SCHEMA_V11"
            fi
            echo "  Using schema $SCHEMA_FILE (schema_version: $SCHEMA_VER)"
            ajv validate \
              -s "$SCHEMA_FILE" \
              -d /tmp/example-converted.json \
              --strict=false \
              --spec=draft2020 \
              && echo "  ✓ valid" \
              || (echo "  ✗ invalid" && exit 1)
          done

      - name: Validate example JSON files
        run: |
          for file in examples/*.json; do
            echo "Validating $file..."
            SCHEMA_VER=$(node -e "const f=require('./$file'); console.log(f.schema_version||'1.0');")
            if [[ "$SCHEMA_VER" == 1.0* ]]; then
              SCHEMA_FILE="$SCHEMA_V10"
            elif [[ "$SCHEMA_VER" == 1.2* ]]; then
              SCHEMA_FILE="$SCHEMA_V12"
            else
              SCHEMA_FILE="$SCHEMA_V11"
            fi
            echo "  Using schema $SCHEMA_FILE (schema_version: $SCHEMA_VER)"
            ajv validate \
              -s "$SCHEMA_FILE" \
              -d "$file" \
              --strict=false \
              --spec=draft2020 \
              && echo "  ✓ valid" \
              || (echo "  ✗ invalid" && exit 1)
          done

      - name: Validate any stories.yaml files in repo
        run: |
          find . -name "stories.yaml" \
            -not -path "./examples/*" \
            -not -path "./.git/*" \
            -not -path "./node_modules/*" | while read file; do
            echo "Validating $file..."
            node -e "
              const yaml = require('js-yaml');
              const fs = require('fs');
              const doc = yaml.load(fs.readFileSync('$file', 'utf8'));
              fs.writeFileSync('/tmp/stories-check.json', JSON.stringify(doc, null, 2));
            "
            SCHEMA_VER=$(node -e "const f=require('/tmp/stories-check.json'); console.log(f.schema_version||'1.0');")
            if [[ "$SCHEMA_VER" == 1.0* ]]; then
              SCHEMA_FILE="$SCHEMA_V10"
            elif [[ "$SCHEMA_VER" == 1.2* ]]; then
              SCHEMA_FILE="$SCHEMA_V12"
            else
              SCHEMA_FILE="$SCHEMA_V11"
            fi
            echo "  Using schema $SCHEMA_FILE (schema_version: $SCHEMA_VER)"
            ajv validate \
              -s "$SCHEMA_FILE" \
              -d /tmp/stories-check.json \
              --strict=false \
              --spec=draft2020 \
              && echo "  ✓ $file is valid" \
              || (echo "  ✗ $file is invalid" && exit 1)
          done

      - name: Clean up
        if: always()
        run: rm -f /tmp/example-converted.json /tmp/stories-check.json
